<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3ddc84"/>
      <stop offset="1" stop-color="#11a86b"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#bg)"/>
  <rect x="80" y="80" width="864" height="864" rx="200" fill="url(#sheen)"/>

  <!-- 3x3 grid of rounded cells; top-left cell is the keyboard-focused one -->
  <g filter="url(#ds)">
    <!-- row 1 -->
    <rect x="276" y="276" width="140" height="140" rx="28" fill="#ffffff"/>
    <rect x="442" y="276" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="608" y="276" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <!-- row 2 -->
    <rect x="276" y="442" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="442" y="442" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="608" y="442" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <!-- row 3 -->
    <rect x="276" y="608" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="442" y="608" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
    <rect x="608" y="608" width="140" height="140" rx="28" fill="#ffffff" fill-opacity="0.55"/>
  </g>

  <!-- keyboard-focus ring on the top-left cell -->
  <rect x="258" y="258" width="176" height="176" rx="40" fill="none" stroke="#ffffff" stroke-width="20" stroke-opacity="0.95"/>
</svg>
